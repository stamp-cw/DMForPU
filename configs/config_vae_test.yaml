seed: 42

data:
  name: SyntheticPUMatCut32Test
  image_size: 32
  color_channels: 1
  num_workers: 1
  scale_k: 3
  method: kdf
  k_min: 0
  k_max: 3

model:
  name: LatentVAE
  sample_size: 32
  layers_per_block: 2
  latent_channels: 4
  in_channels: 1
  out_channels: 1
  block_out_channels: [ 64, 128, 256, 512 ]

training:
  device: cuda
  brand_new_epochs: 1001
  continue_training_epochs: 1001
  batch_size: 64
  use_all_data: false
  amp: true
  log_freq: 1
  snapshot_freq: 100
  eval_freq: 1
  snapshot_sampling: false
  snapshot_batch_size: 2

sampling:
  device: cuda
  batch_size: 8
  eval: true
  total_samples: 8
  record_freq: 1
  eps: 1e-5
  fix_seed: true

eval:
  device: cuda
  batch_size: 8
  total_samples: 8
  eps: 1e-5
  fix_seed: true

optim:
  optimizer: Adam
  lr: 0.0001
  weight_decay: 0.1
  beta1: 0.9
  eps: 1e-8
  warmup: 2
  grad_clip: 1.0
  momentum: 0.9

loss_type:
  name: VAELOSS

iio:
  use_tensorboard: true
  use_wandb: false
  save_pth_to_wandb: false

metrics:
  l1: true
