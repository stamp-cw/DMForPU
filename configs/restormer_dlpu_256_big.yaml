seed: 42

loss_type:
  name: RestormerLoss

meter:
  name: PUNetMeter

mmodel:
  name: RestormerMModel

data:
  name: InSARDLPUMat256Big
  image_size: 256
  color_channels: 1
  num_workers: 1
  k_min: 0
  k_max: 7
  wavelet_level: 1
  wavelet_type: haar
  mean: 0
  std: 0
  scale_alpha: 1
  noise_snr: 100

training:
  device: cuda
  brand_new_epochs: 100001
  continue_training_epochs: 1000001
#  batch_size: 4
  batch_size: 32
  use_all_data: false
  amp: true
  log_freq: 1
#  snapshot_freq: 100
  snapshot_freq: 20
  snapshot_sampling: false
#  snapshot_val: true
  snapshot_val: false
#  snapshot_val_freq: 100
  snapshot_val_freq: 20
  snapshot_batch_size: 32
  snapshot_best_loss: true
  best_evaluate_loss: 0.1

model:
  name: Restormer
#  sample_size: 128
  sample_size: 256
#  in_channels: 1
#  out_channels: 1
#  layers_per_block: 2
#  block_out_channels: [64, 128, 256, 512]

sampling:
  device: cuda
  batch_size: 1
  total_samples: 10
  record_freq: 1
  eps: 1e-5
  fix_seed: true

val:
  device: cuda
  batch_size: 32

test:
  device: cuda
  batch_size: 2
  total_samples: 30

optim:
  optimizer: Adam
  lr: 0.0001
  weight_decay: 0.0001
  beta1: 0.9
  eps: 1e-8
  warmup: 2
  grad_clip: 1.0
  momentum: 0.9

iio:
  use_tensorboard: true
  use_wandb: false
  save_pth_to_wandb: false
